<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゴミ集積所マップ（先進/総合ゼミナール・鈴木研究室体験）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="design.css" />
</head>
<body>

    <header>
        <h1>ゴミ集積所マップ（先進/総合ゼミナール・鈴木研究室体験）</h1>
        <div class="description">台帳番号、緯度、経度、エリア、行政区、所在地をマッピング（Wフィルター機能）</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="upload-area" id="dropZone" onclick="document.getElementById('csvFile').click()">
                <p><strong>CSVファイルをここにドロップ</strong></p>
                <p style="font-size: 0.8rem; color: var(--accent-color);">またはファイルを選択</p>
                <input type="file" id="csvFile" accept=".csv">
            </div>

            <div class="filter-section">
                <h3>🔍 条件絞り込み</h3>
                
                <div class="filter-group">
                    <label for="areaFilter">エリア</label>
                    <select id="areaFilter" class="filter-select" disabled>
                        <option value="all">-- すべてのエリアを表示 --</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="districtFilter">行政区</label>
                    <select id="districtFilter" class="filter-select" disabled>
                        <option value="all">-- すべての行政区を表示 --</option>
                    </select>
                </div>
            </div>

            <div class="data-summary" id="dataSummary" style="display: none;">
                <h3 id="listTitle">対象地点一覧 (0件)</h3>
                <ul class="data-list" id="locationList"></ul>
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
